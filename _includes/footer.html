<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand">
      <span class="logo-icon">👾</span>
      <span>{{ site.title }}</span>
      <span class="footer-tagline">{{ site.tagline }}</span>
    </div>
    <div class="footer-links">
      <a href="{{ site.youtube_url }}" target="_blank" rel="noopener">YouTube</a>
      <a href="https://github.com/{{ site.github_username }}" target="_blank" rel="noopener">GitHub</a>
      <a href="{{ site.note_url }}" target="_blank" rel="noopener">note.com</a>
    </div>
    <div class="footer-copy">
      &copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.
    </div>
  </div>
</footer>
